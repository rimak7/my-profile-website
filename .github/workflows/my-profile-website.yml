# .github/workflows/deploy.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML files exist
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html not found!"
            exit 1
          fi
          echo "✅ index.html found"

      - name: Validate HTML structure
        run: |
          if ! grep -q "<html" index.html; then
            echo "❌ index.html missing <html> tag"
            exit 1
          fi
          if ! grep -q "<head" index.html; then
            echo "❌ index.html missing <head> tag"
            exit 1
          fi
          if ! grep -q "<body" index.html; then
            echo "❌ index.html missing <body> tag"
            exit 1
          fi
          echo "✅ HTML structure looks good"

      - name: Check for broken local links
        run: |
          # Extract local src/href references and verify files exist
          grep -oP '(src|href)="\K[^"]+' index.html | grep -v "^http" | grep -v "^#" | while read file; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing file referenced in HTML: $file"
              exit 1
            fi
          done
          echo "✅ All local links valid"

  deploy:
    name: 🚀 Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --delete
          echo "✅ Files uploaded to S3"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache cleared"

  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Pipeline succeeded!"
          echo "🌍 Site is live at your domain"
          # Optional: add Slack webhook here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"✅ Profile site deployed successfully!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Failure notification
        if: needs.test.result == 'failure' || needs.deploy.result == 'failure'
        run: |
          echo "❌ Pipeline failed!"
          echo "Check the logs at: https://github.com/rimak7/my-profile-website/actions"
          # Optional: add Slack webhook here
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"❌ Profile site deployment failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}