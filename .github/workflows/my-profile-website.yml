name: CI/CD — rimadev.com

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:

  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found"
            exit 1
          fi
          echo "index.html found"

      - name: Validate HTML structure
        run: |
          for tag in "<html" "<head" "<body"; do
            if ! grep -q "$tag" index.html; then
              echo "index.html missing $tag tag"
              exit 1
            fi
          done
          echo "HTML structure valid"

      - name: Check for broken local links
        run: |
          grep -oP '(src|href)="\K[^"]+' index.html \
            | grep -v "^http" \
            | grep -v "^#" \
            | grep -v "^mailto:" \
            | grep -v "^tel:" \
            | while read file; do
              if [ ! -f "$file" ]; then
                echo "Missing local file: $file"
                exit 1
              fi
            done
          echo "All local links valid"

      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          if [ "$SIZE" -lt 500 ]; then
            echo "index.html too small - $SIZE bytes"
            exit 1
          fi
          echo "File size OK - $SIZE bytes"

  deploy:
    name: Deploy to S3 and CloudFront
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      invalidation_id: ${{ steps.invalidate.outputs.invalidation_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
        
          echo "Files synced to S3"

      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
          echo "Invalidation created: $INVALIDATION_ID"

      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidate.outputs.invalidation_id }}
          echo "CloudFront cache cleared"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://rimadev.com)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed - HTTP $STATUS"
            exit 1
          fi
          echo "Site is live - HTTP $STATUS"

  notify:
    name: Notify via SNS
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

